<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; text-align: center; }
    canvas { margin: 10px; border: 1px solid #ddd; }
    a { display: inline-block; margin: 10px; padding: 8px 16px; background: #0b0b7e; color: #fff; text-decoration: none; border-radius: 4px; }
    a:hover { background: #1a1a9e; }
  </style>
</head>
<body>
  <h1>LinuxDo Side Reader - Icon Generator</h1>
  <p>点击下方按钮下载图标文件，然后放入 <code>icons/</code> 目录</p>
  <div id="icons"></div>
  <script>
    [16, 48, 128].forEach(size => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const padding = size * 0.1;
      const r = size * 0.18;

      // 圆角矩形背景
      ctx.fillStyle = '#0b0b7e';
      ctx.beginPath();
      ctx.moveTo(padding + r, padding);
      ctx.lineTo(size - padding - r, padding);
      ctx.quadraticCurveTo(size - padding, padding, size - padding, padding + r);
      ctx.lineTo(size - padding, size - padding - r);
      ctx.quadraticCurveTo(size - padding, size - padding, size - padding - r, size - padding);
      ctx.lineTo(padding + r, size - padding);
      ctx.quadraticCurveTo(padding, size - padding, padding, size - padding - r);
      ctx.lineTo(padding, padding + r);
      ctx.quadraticCurveTo(padding, padding, padding + r, padding);
      ctx.closePath();
      ctx.fill();

      // 侧边栏图标
      const iconPadding = size * 0.22;
      ctx.fillStyle = '#ffffff';
      // 左侧竖线
      ctx.fillRect(iconPadding, iconPadding, size * 0.08, size - iconPadding * 2);
      // 右侧矩形（侧边栏）
      ctx.fillRect(size * 0.38, iconPadding, size * 0.4, size - iconPadding * 2);

      // 下载链接
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.textContent = `Download icon${size}.png (${size}x${size})`;
      document.getElementById('icons').appendChild(link);
      document.getElementById('icons').appendChild(document.createElement('br'));
    });
  </script>
</body>
</html>
